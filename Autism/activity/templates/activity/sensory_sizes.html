<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رتب حسب الحجم — إحتواء</title>
</head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

:root {
  --green-dark:  #4a6e38;
  --green-mid:   #7aad60;
  --green-light: #d4edbc;
  --green-pale:  #eef7e6;
  --cream:       #faf8f3;
  --text-dark:   #2c3e20;
  --text-mid:    #5a6b50;
  --text-light:  #8fa880;
  --radius-lg:   20px;
  --radius-md:   14px;
}

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--cream);
  color: var(--text-dark);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 60px;
  direction: rtl;
}

.page-header {
  width: 100%;
  background: var(--green-dark);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 40px;
}
.header-logo { font-size: 22px; font-weight: 800; color: #fff; }
.header-logo span { color: var(--green-light); }
.header-badge {
  background: rgba(255,255,255,0.15);
  color: #fff;
  border-radius: 20px;
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 500;
}

.game-card {
  width: 100%;
  max-width: 700px;
  background: #fff;
  border-radius: var(--radius-lg);
  border: 1.5px solid var(--green-light);
  padding: 36px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.game-title { font-size: 22px; font-weight: 800; color: var(--text-dark); margin-bottom: 6px; }
.game-sub   { font-size: 14px; color: var(--text-light); margin-bottom: 10px; text-align: center; }

.progress-wrap {
  width: 100%; max-width: 360px;
  background: var(--green-pale);
  border-radius: 20px; height: 8px;
  margin-bottom: 28px; overflow: hidden;
}
.progress-bar {
  height: 100%; background: var(--green-mid);
  border-radius: 20px; transition: width .4s ease;
}

.shuffle-area {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
  min-height: 100px;
  align-items: flex-end;
  margin-bottom: 28px;
  padding: 12px;
  width: 100%;
  background: var(--green-pale);
  border-radius: var(--radius-md);
  border: 2px dashed var(--green-light);
}
.shuffle-area.drag-over { border-color: var(--green-mid); background: #e0f5d0; }

.size-item {
  border-radius: 12px;
  background: var(--green-mid);
  cursor: grab;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  transition: transform .15s, box-shadow .15s;
  touch-action: none;
  flex-shrink: 0;
}
.size-item:hover  { transform: scale(1.06) translateY(-4px); box-shadow: 0 6px 18px rgba(74,110,56,.2); }
.size-item:active { cursor: grabbing; }
.size-item.dragging { opacity: .45; }

.sort-label {
  font-size: 13px;
  color: var(--text-light);
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  max-width: 460px;
  margin-bottom: 14px;
}
.sort-label::before, .sort-label::after {
  content: ''; flex: 1; height: 1px; background: var(--green-light);
}

.sort-slots {
  display: flex;
  gap: 16px;
  justify-content: center;
  align-items: flex-end;
  flex-wrap: wrap;
  width: 100%;
  padding: 12px;
  background: #f5faf0;
  border-radius: var(--radius-md);
  border: 2px solid var(--green-light);
  min-height: 100px;
}

.sort-slot {
  border-radius: 12px;
  border: 3px dashed #ccc;
  background: rgba(255,255,255,.6);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #ccc;
  transition: all .2s;
  flex-shrink: 0;
}
.sort-slot.drag-over { border-color: var(--green-mid); background: var(--green-pale); transform: scale(1.05); }
.sort-slot.matched   { border-style: solid; border-color: var(--green-mid); }
.sort-slot.wrong     { animation: shake .3s ease; border-color: #f44336; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-8px); }
  75%      { transform: translateX(8px); }
}

.size-arrows {
  font-size: 13px;
  color: var(--text-light);
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.success-banner {
  display: none; flex-direction: column; align-items: center; gap: 10px;
  background: var(--green-pale); border: 2px solid var(--green-light);
  border-radius: var(--radius-md); padding: 22px 40px; margin-top: 24px;
}
.success-banner.show { display: flex; animation: popIn .4s cubic-bezier(.34,1.4,.64,1); }
.success-banner .star { font-size: 38px; }
.success-banner p     { font-size: 18px; font-weight: 700; color: var(--green-dark); }
.success-banner small { font-size: 13px; color: var(--text-light); }

@keyframes popIn {
  from { transform: scale(.7); opacity: 0; }
  to   { transform: scale(1);  opacity: 1; }
}

.reset-btn {
  margin-top: 20px; padding: 11px 32px; border-radius: 30px;
  border: none; background: var(--green-dark); color: #fff;
  font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: background .2s, transform .15s;
}
.reset-btn:hover  { background: var(--green-mid); transform: scale(1.03); }
.reset-btn:active { transform: scale(.97); }

@media (max-width: 520px) {
  .page-header { padding: 16px 18px; }
  .game-card   { padding: 22px 14px; }
}

.back-bar {
  width: 100%;
  max-width: 700px;
  margin-bottom: 16px;
}
.back-btn-game {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--cream);
  border: 1.5px solid var(--green-light);
  border-radius: 30px;
  padding: 8px 18px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-mid);
  text-decoration: none;
  transition: all .2s;
}
.back-btn-game:hover {
  border-color: var(--green-mid);
  color: var(--green-dark);
}

</style>
<body>
<br>
<br>
<br>
<div class="back-bar">
    <button class="back-btn-game" onclick="history.back()">
         رجوع
    </button>
</div>
<div class="game-card">
  <div class="game-title">📏 رتب حسب الحجم</div>
  <div class="game-sub">اسحب الأشكال ورتبها من الأصغر إلى الأكبر</div>

  <div class="progress-wrap">
    <div class="progress-bar" id="sizeProgress" style="width:0%"></div>
  </div>

  <div class="shuffle-area" id="shuffleArea"
       ondragover="dov(event)" ondrop="returnToPool(event)" ondragleave="dlv(event)">
  </div>

  <div class="sort-label">رتب من الأصغر ← للأكبر</div>

  <div class="sort-slots" id="sortSlots"></div>

  <div class="size-arrows">⬅ صغير &nbsp;&nbsp;&nbsp; كبير ➡</div>

  <div class="success-banner" id="sizeWin">
    <div class="star">🏆</div>
    <p>رائع! رتبت الأحجام بشكل صحيح!</p>
    <small>تعلمت الفرق بين الصغير والكبير</small>
  </div>
  <button class="reset-btn" onclick="initGame()">🔄 إعادة اللعب</button>
</div>

<script>
  const SIZES = [
    { id: 1, w: 36,  h: 36,  label: '1' },
    { id: 2, w: 54,  h: 54,  label: '2' },
    { id: 3, w: 72,  h: 72,  label: '3' },
    { id: 4, w: 90,  h: 90,  label: '4' },
    { id: 5, w: 108, h: 108, label: '5' },
  ];

  let dragId = null;
  let matched = 0;
  const total = SIZES.length;

  function dov(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
  function dlv(e) { e.currentTarget.classList.remove('drag-over'); }

  function shuffle(arr) {
    return [...arr].sort(() => Math.random() - .5);
  }

  function initGame() {
    matched = 0;
    document.getElementById('sizeProgress').style.width = '0%';
    document.getElementById('sizeWin').classList.remove('show');

    const pool = document.getElementById('shuffleArea');
    pool.innerHTML = '';
    const slots = document.getElementById('sortSlots');
    slots.innerHTML = '';

    shuffle(SIZES).forEach(s => {
      const el = document.createElement('div');
      el.className = 'size-item';
      el.id = 'si-' + s.id;
      el.dataset.size = s.id;
      el.style.width  = s.w + 'px';
      el.style.height = s.h + 'px';
      el.textContent  = s.label;
      el.draggable = true;
      pool.appendChild(el);
    });

    SIZES.forEach((s, i) => {
      const slot = document.createElement('div');
      slot.className = 'sort-slot';
      slot.dataset.target = s.id;
      slot.dataset.pos    = i + 1;
      slot.style.width    = s.w + 6 + 'px';
      slot.style.height   = s.h + 6 + 'px';
      slot.textContent    = i + 1;
      slot.ondragover     = dov;
      slot.ondragleave    = dlv;
      slot.ondrop         = e => { e.preventDefault(); dlv(e); dropSize(e.currentTarget); };
      slots.appendChild(slot);
    });

    bindDrag();
  }

  function bindDrag() {
    document.querySelectorAll('.size-item').forEach(el => {
      el.addEventListener('dragstart', () => { dragId = el.id; el.classList.add('dragging'); });
      el.addEventListener('dragend',   () => el.classList.remove('dragging'));
      el.addEventListener('touchstart', () => { dragId = el.id; el.style.opacity = '.5'; }, { passive: true });
      el.addEventListener('touchend', e => {
        el.style.opacity = '1';
        const t = e.changedTouches[0];
        el.style.display = 'none';
        const under = document.elementFromPoint(t.clientX, t.clientY);
        el.style.display = '';
        if (!under) return;
        const slot = under.closest('.sort-slot');
        if (slot) dropSize(slot);
      });
    });
  }

  function dropSize(slot) {
    if (!dragId) return;
    const el = document.getElementById(dragId);
    if (!el) return;
    if (slot.classList.contains('matched')) return;

    if (parseInt(el.dataset.size) === parseInt(slot.dataset.target)) {
      el.style.cursor = 'default';
      el.draggable = false;
      slot.innerHTML = '';
      slot.appendChild(el);
      slot.classList.add('matched');
      matched++;
      document.getElementById('sizeProgress').style.width = (matched / total * 100) + '%';
      if (matched === total) document.getElementById('sizeWin').classList.add('show');
    } else {
      slot.classList.add('wrong');
      setTimeout(() => slot.classList.remove('wrong'), 400);
    }
    dragId = null;
  }

  function returnToPool(e) {
    e.preventDefault();
    dlv(e);
    if (!dragId) return;
    const el = document.getElementById(dragId);
    if (el) document.getElementById('shuffleArea').appendChild(el);
    dragId = null;
  }

  initGame();
</script>
</body>
</html>
