{% extends 'main/base.html' %}
{% load static %}

{% block title %}Ehtiwa — تعديل الملف{% endblock %}

{% block style %}
<link rel="stylesheet" href="{% static 'accounts/css/style.css' %}">
{% endblock %}

{% block content %}

<div class="profile-page">

    <main class="profile-main">

        <a href="{% url 'accounts:profile' %}" class="back-link">
            ← العودة للملف الشخصي
        </a>

        <div class="page-heading">
            <h1>تعديل <span>الملف الشخصي</span></h1>
            <p>قم بتحديث بياناتك</p>
        </div>

        <form method="POST">
            {% csrf_token %}

            <!-- NAME -->
            <div class="form-grid-2">

                <div class="form-group">
                    <label>الاسم الأول</label>
                    <input class="form-input" type="text"
                        name="first_name"
                        value="{{ request.user.first_name }}">
                </div>

                <div class="form-group">
                    <label>اسم العائلة</label>
                    <input class="form-input" type="text"
                        name="last_name"
                        value="{{ request.user.last_name }}">
                </div>

            </div>

            <!-- EMAIL -->
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input class="form-input" type="email"
                    name="email"
                    value="{{ request.user.email }}">
            </div>

            <!-- PHONE -->
            <div class="form-group">
                <label>رقم الجوال</label>
                <input class="form-input" type="text"
                    name="phone"
                    value="{{ profile.phone|default:'' }}">
            </div>

            <!-- CITY -->
            <div class="form-group">
                <label>المدينة</label>
                <input class="form-input" type="text"
                    name="city"
                    value="{{ profile.city|default:'' }}">
            </div>

            <!-- SAVE -->
            <button class="btn-primary" type="submit">
                حفظ التغييرات
            </button>

        </form>

    </main>

</div>


<script>
    function previewAvatar(input) {
        if (input.files && input.files[0]) {

            const reader = new FileReader();

            reader.onload = e => {
                const src = e.target.result;

                document.getElementById('avatarPreviewEl').innerHTML =
                    `<img src="${src}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
            };

            reader.readAsDataURL(input.files[0]);
        }
    }

    function handleSave() {

        const fname = document.getElementById('ep-fname').value.trim();

        if (!fname) {
            alert('الرجاء إدخال الاسم الأول');
            return;
        }

        const msg = document.getElementById('saveMsg');

        msg.textContent = '✅ تم حفظ التغييرات بنجاح';
        msg.style.color = 'var(--green-dark)';
        msg.style.fontWeight = '700';

        setTimeout(() => {

            msg.textContent = 'يتم حفظ جميع التغييرات بأمان داخل حسابك.';
            msg.style.color = '';
            msg.style.fontWeight = '';

        }, 3000);
    }
</script>


{% endblock %}
